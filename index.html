<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LaunchLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-menu" id="menu">
        <h1>LaunchLab 🚀</h1>
        <button class="main-menu-btn" onclick="startGame()">Play</button>
        <button class="main-menu-btn" onclick="saveGame()">Save Game</button>
        <button class="main-menu-btn" onclick="loadGame()">Load Game</button>
        <button class="main-menu-btn" onclick="howToPlay()">How To Play</button>
    </div>

    <div class="level-selector-screen" id="levels">
        <h1>LEVELS</h1>
        <div class="level-selector-buttons">
            <button class="level-selector-btn" id="l1" onclick="level(1)">Level <br> 1</button>
            <button class="level-selector-btn" id="l2" onclick="level(2)">Level <br> 2</button>
            <button class="level-selector-btn" id="l3" onclick="level(3)">Level <br> 3</button>
            <button class="level-selector-btn" id="l4" onclick="level(4)">Level <br> 4</button>
            <button class="level-selector-btn" id="l5" onclick="level(5)">Level <br> 5</button>
            <button class="level-selector-btn" id="l6" onclick="level(6)">Level <br> 6</button>
            <button class="level-selector-btn" id="l7" onclick="level(7)">Level <br> 7</button>
            <button class="level-selector-btn" id="l8" onclick="level(8)">Level <br> 8</button>
        </div>
        <button class="return" onclick="mainMenu()">Back</button>
    </div>


    <div class="game-screen" id="gameScreen">

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <button class="return" onclick="backToLevels()">Back</button>

        <div class="controls">
            <div id="angleControl">
                <label>Angle:</label>
                <input type="range" id="angleSlider" min="0" max="90" value="0">
                <span id="angleValue">0</span>
                <input type="number" id="angleInput" min="0" max="90" value="0" style="width: 70px; margin-left: 8px;">
            </div>

            <div id="velocityControl">
                <label>Velocity:</label>
                <input type="range" id="velocitySlider" min="0" max="100" value="0">
                <span id="velocityValue">0</span>
                <input type="number" id="velocityInput" min="0" max="100" value="0" style="width: 70px; margin-left: 8px;">
            </div>

            <div id="heightControl">
                <label>Height:</label>
                <input type="range" id="heightSlider" min="0" max="100" value="0">
                <span id="heightValue">0</span>
                <input type="number" id="heightInput" min="0" max="100" value="0" style="width: 70px; margin-left: 8px;">
            </div>

            <button onclick="launchProjectile()">Launch</button>
        </div>

        <div id="controlsInfo" class="info-box">
            <h3>Information</h3>
            <p id="infoTargetPosition">Target Position: -</p>
            <p id="infoStartingPosition">Starting Position: -</p>
            <p id="infoInitialVelocity">Initial Velocity: -</p>
            <p id="infoLaunchAngle">Angle of Launch: -</p>
        </div>

        <div id="simulationInfo" class="info-box hidden">
            <h3>Simulation</h3>
            <p id="simPosition">Position: -</p>
            <p id="simVelocity">Velocity: -</p>
            <p id="simTime">Time: -</p>
        </div>

    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h2>Save Game</h2>
            <input type="text" id="saveCodeBox" readonly>
            <button onclick="copySaveCode()">Copy</button>
            <button onclick="closeSave()">Close</button>
        </div>
    </div>

    <div id="loadModal" class="modal">
        <div class="modal-content">
            <h2>Load Game</h2>
            <input type="text" id="loadCodeInput" placeholder="Enter save code">
            <button onclick="confirmLoad()">Load</button>
            <button onclick="closeLoad()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
