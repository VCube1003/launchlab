<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LaunchLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-menu" id="menu">
        <h1>LaunchLab 🚀</h1>
        <button class="main-menu-btn" onclick="startGame()">Play</button>
        <button class="main-menu-btn" onclick="saveGame()">Save Game</button>
        <button class="main-menu-btn" onclick="loadGame()">Load Game</button>
        <button class="main-menu-btn" onclick="howToPlay()">How To Play</button>
    </div>

    <div class="level-selector-screen" id="levels">
        <h1>LEVELS</h1>
        <div class="level-selector-buttons">
            <button class="level-selector-btn" onclick="level(1)">Level <br> 1</button>
            <button class="level-selector-btn" onclick="level(2)">Level <br> 2</button>
            <button class="level-selector-btn" onclick="level(3)">Level <br> 3</button>
            <button class="level-selector-btn" onclick="level(4)">Level <br> 4</button>
            <button class="level-selector-btn" onclick="level(5)">Level <br> 5</button>
            <button class="level-selector-btn" onclick="level(6)">Level <br> 6</button>
            <button class="level-selector-btn" onclick="level(7)">Level <br> 7</button>
            <button class="level-selector-btn" onclick="level(8)">Level <br> 8</button>
        </div>
        <button class="return" onclick="mainMenu()">Back</button>
    </div>

    <div class="level-screen" id="level">

        <div class="level-1" id="levelone">
            <h1>Level 1 stuff</h1>
        </div>

        <div class="level-2" id="leveltwo">
            <h1>Level 2 stuff</h1>
        </div>

        <div class="level-3" id="levelthree">
            <h1>Level 3 stuff</h1>
        </div>

        <div class="level-4" id="levelfour">
            <h1>Level 4 stuff</h1>
        </div>

        <div class="level-5" id="levelfive">
            <h1>Level 5 stuff</h1>
        </div>

        <div class="level-6" id="levelsix">
            <h1>Level 6 stuff</h1>
        </div>

        <div class="level-7" id="levelseven">
            <h1>Level 7 stuff</h1>
        </div>

        <div class="level-8" id="leveleight">
            <h1>Level 8 stuff</h1>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
