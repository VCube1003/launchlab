<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LaunchLab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-menu" id="menu">
        <h1>LaunchLab 🚀</h1>
        <button class="main-menu-btn" onclick="startGame()">Play</button>
        <button class="main-menu-btn" onclick="saveGame()">Save Game</button>
        <button class="main-menu-btn" onclick="loadGame()">Load Game</button>
        <button class="main-menu-btn" onclick="howToPlay()">How To Play</button>
    </div>

    <div class="level-selector-screen" id="levels">
        <h1>LEVELS</h1>
        <div class="level-selector-buttons">
            <button class="level-selector-btn" onclick="level1()">Level <br> 1</button>
            <button class="level-selector-btn" onclick="level2()">Level <br> 2</button>
            <button class="level-selector-btn" onclick="level3()">Level <br> 3</button>
            <button class="level-selector-btn" onclick="level4()">Level <br> 4</button>
            <button class="level-selector-btn" onclick="level5()">Level <br> 5</button>
            <button class="level-selector-btn" onclick="level6()">Level <br> 6</button>
            <button class="level-selector-btn" onclick="level7()">Level <br> 7</button>
            <button class="level-selector-btn" onclick="level8()">Level <br> 8</button>
        </div>
    </div>

    <div class="level-screen" id="level">

        <div class="level-1" id="levelone">
            <h1>Level 1 stuff</h1>
        </div>

        <div class="level-2" id="leveltwo">
        </div>

        <div class="level-3" id="levelthree">
        </div>

        <div class="level-4" id="levelfour">
        </div>

        <div class="level-5" id="levelfive">
        </div>

        <div class="level-6" id="levelsix">
        </div>

        <div class="level-7" id="levelseven">
        </div>

        <div class="level-8" id="leveleight">
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
